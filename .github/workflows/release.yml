name: Release
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-rust:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'release' &&
      startsWith(github.event.release.tag_name, 'v')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Maximize Runner Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/powershell
      - uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - name: Cache Rust
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            rust/taskchampion-android/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-rust-fatto-ci-${{ hashFiles('flake.lock', 'rust/taskchampion-android/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-fatto-ci-${{ hashFiles('flake.lock') }}
      - name: Build Rust Artifacts
        run: nix develop .#fatto-ci --no-update-lock-file --command just build-rust-all build-bindings
      - name: Upload Rust Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rust-artifacts
          path: |
            android/app/src/main/jniLibs
            android/app/src/main/uniffi

  build-kotlin:
    needs: build-rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Maximize Runner Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/powershell
      - uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - name: Download Rust Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rust-artifacts
          path: android/app/src/main
      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-fatto-ci-kotlin-${{ hashFiles('flake.lock', '**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-fatto-ci-kotlin-${{ hashFiles('flake.lock') }}

      - name: Build Beta APK
        if: endsWith(github.event.release.tag_name, '-beta')
        run: nix develop .#fatto-ci-kotlin --no-update-lock-file --command just build-beta-apk
        env:
          FATTO_KEYSTORE_BASE64: ${{ secrets.FATTO_KEYSTORE_BASE64 }}
          FATTO_KEYSTORE_PASSWORD: ${{ secrets.FATTO_KEYSTORE_PASSWORD }}
          FATTO_KEY_ALIAS: ${{ secrets.FATTO_KEY_ALIAS }}

      - name: Build Stable APK
        if: "!endsWith(github.event.release.tag_name, '-beta')"
        run: nix develop .#fatto-ci-kotlin --no-update-lock-file --command just build-release-apk
        env:
          FATTO_KEYSTORE_BASE64: ${{ secrets.FATTO_KEYSTORE_BASE64 }}
          FATTO_KEYSTORE_PASSWORD: ${{ secrets.FATTO_KEYSTORE_PASSWORD }}
          FATTO_KEY_ALIAS: ${{ secrets.FATTO_KEY_ALIAS }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-apks
          path: dist/*.apk

      - name: Attach APK to Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: dist/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
