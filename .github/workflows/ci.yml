name: CI
on:
  pull_request:
  push:
    branches: [ main ]
jobs:
  generate-bindings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Maximize Runner Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/powershell
      - uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - name: Cache Rust
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            rust/taskchampion-android/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-rust-fatto-ci-${{ hashFiles('flake.lock', 'rust/taskchampion-android/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-fatto-ci-${{ hashFiles('flake.lock') }}
      - name: Generate uniffi bindings
        run: nix develop .#fatto-ci --no-update-lock-file --command just build-bindings
      - name: Upload uniffi bindings
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: uniffi-bindings
          path: android/app/src/main/uniffi/
          retention-days: 1

  ci:
    runs-on: ubuntu-latest
    needs: generate-bindings
    strategy:
      fail-fast: false
      matrix:
        include:
          - command: check-lint-rust
            shell: fatto-ci-rust
          - command: check-lint-kotlin
            shell: fatto-ci-kotlin
          - command: test-rust
            shell: fatto-ci-rust
          - command: test-kotlin
            shell: fatto-ci-kotlin
          - command: test-ci-rust
            shell: fatto-ci-rust
          - command: build-debug-only
            shell: fatto-ci-kotlin
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Maximize Runner Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/powershell
      - uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - name: Download uniffi bindings
        if: contains(matrix.shell, 'kotlin')
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: uniffi-bindings
          path: android/app/src/main/uniffi/
      - name: Cache Rust
        if: contains(matrix.shell, 'rust')
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            rust/taskchampion-android/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-rust-${{ matrix.shell }}-${{ hashFiles('flake.lock', 'rust/taskchampion-android/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-${{ matrix.shell }}-${{ hashFiles('flake.lock') }}
      - name: Cache Gradle
        if: contains(matrix.shell, 'kotlin')
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: v3-${{ runner.os }}-gradle-${{ matrix.shell }}-${{ hashFiles('flake.lock', '**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            v3-${{ runner.os }}-gradle-${{ matrix.shell }}-${{ hashFiles('flake.lock') }}
      - name: Run ${{ matrix.command }}
        run: nix develop .#${{ matrix.shell }} --no-update-lock-file --command just ${{ matrix.command }}
