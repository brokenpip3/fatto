name: Beta Release
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-rust:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' &&
       startsWith(github.event.release.tag_name, 'v') &&
       endsWith(github.event.release.tag_name, '-beta'))
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Maximize Runner Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/powershell
      - uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - name: Cache Rust
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            rust/taskchampion-android/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-rust-fatto-ci-${{ hashFiles('flake.lock', 'rust/taskchampion-android/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-fatto-ci-${{ hashFiles('flake.lock') }}
      - name: Build Rust Artifacts
        run: nix develop .#fatto-ci --no-update-lock-file --command just build-rust-all build-bindings
      - name: Upload Rust Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rust-artifacts
          path: |
            android/app/src/main/jniLibs
            android/app/src/main/uniffi

  build-kotlin:
    needs: build-rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Maximize Runner Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/powershell
      - uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - name: Download Rust Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rust-artifacts
          path: android/app/src/main
      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-fatto-ci-kotlin-${{ hashFiles('flake.lock', '**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-fatto-ci-kotlin-${{ hashFiles('flake.lock') }}
      - name: Build Beta APK
        run: nix develop .#fatto-ci-kotlin --no-update-lock-file --command just build-beta-apk
        env:
          BETA_KEYSTORE_BASE64: ${{ secrets.BETA_KEYSTORE_BASE64 }}
          BETA_KEYSTORE_PASSWORD: ${{ secrets.BETA_KEYSTORE_PASSWORD }}
          BETA_KEY_ALIAS: ${{ secrets.BETA_KEY_ALIAS }}
          BETA_KEY_PASSWORD: ${{ secrets.BETA_KEY_PASSWORD }}
      - name: Upload APK Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: beta-apk
          path: dist/*-beta.apk
      - name: Attach APK to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: dist/*-beta.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
